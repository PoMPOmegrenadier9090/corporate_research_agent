services:
  gemini-agent:
    build:
      context: ./agent
      dockerfile: Dockerfile.agent
    image: gemini-agent
    container_name: gemini-agent
    init: true
    environment:
      - TERM=xterm-256color
    env_file:
      - .env
    command: uv run uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./.gemini:/root/.gemini # 認証情報・設定ファイルをホストと共有
      - ./agent:/app
      - /app/.venv # ホスト側の .venv と競合しないようにコンテナ専用のボリュームを確保
    ports:
      - "8000:8000"

  discord-bot:
    build:
      context: ./bot
      dockerfile: Dockerfile.bot
    image: discord-bot
    container_name: discord-bot
    command: watchmedo auto-restart --directory=. --pattern=bot.py --recursive -- python bot.py
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - API_URL=http://gemini-agent:8000/ask
      # Ensure it loads env too if needed, but token is passed.
    env_file:
      - .env
    volumes:
      - ./bot:/app
    depends_on:
      - gemini-agent

